<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fordeler | OnTaxi</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1a3b67',
            accent: '#b33e3e'
          }
        }
      }
    }
  </script>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">

  <div class="text-center max-w-xl px-6">

    <h1 class="text-4xl font-bold text-gray-900 mb-4">
      Fordeler hos <span class="text-primary">On</span><span class="text-accent">Taxi</span>
    </h1>

    <div class="inline-block bg-yellow-100 text-yellow-800 px-4 py-2 rounded-full text-sm font-semibold mb-6">
      🚧 Under utvikling
    </div>

    <p class="text-gray-600 mb-6">
      Vi jobber med å bygge opp en rekke avtaler og fordeler for våre løyvehavere,
      blant annet innen dekk, lading og drift.
    </p>

    <p class="text-gray-600 mb-8">
      Siden vil bli oppdatert fortløpende.
    </p>

    <a href="/kontakt"
       class="inline-block bg-accent text-white px-6 py-3 rounded-full font-semibold hover:bg-red-700 transition">
      Ta kontakt for mer info
    </a>

    <div class="mt-6">
      <a href="/" class="text-sm text-gray-500 hover:text-primary transition">
        ← Tilbake til forsiden
      </a>
    </div>

  </div>

</body>
</html>
